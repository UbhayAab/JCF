<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Carcinome NGO Patient Navigator — Secure, DPDPA-compliant patient data management system for cancer care navigation." />
  <meta name="theme-color" content="#06090f" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Open Graph -->
  <meta property="og:title" content="Patient Navigator — Carcinome NGO" />
  <meta property="og:description" content="Secure, DPDPA-compliant patient data management for cancer care navigation." />
  <meta property="og:type" content="website" />

  <title>Patient Navigator — Carcinome NGO</title>

  <!-- Connection hints (don't block render, just speed up subsequent fetches) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

  <!-- Critical inline CSS for the boot screen — guarantees something paints
       even if every external resource (CDN/font/CSS) is blocked or slow. -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:#06090f;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased}
    .boot-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:16px;text-align:center}
    .boot-spinner{width:32px;height:32px;border:3px solid rgba(148,163,184,0.15);border-top-color:#22d3ee;border-radius:50%;animation:bootspin 0.7s linear infinite}
    @keyframes bootspin{to{transform:rotate(360deg)}}
    .boot-msg{color:#94a3b8;font-size:14px;line-height:1.5;max-width:320px}
    .boot-link{color:#22d3ee;font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;padding:8px 16px;margin-top:4px}
    .boot-link:hover{color:#67e8f9}
    .boot-error{color:#f87171}
  </style>

  <!-- Non-blocking font load: preload-as-style trick + noscript fallback -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

  <!-- App stylesheets — these are local files so they load fast even on slow networks -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2306b6d4' stroke-width='2'><path d='M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z'/></svg>" />
</head>
<body>
  <!-- Boot screen — paints immediately, no external dependencies. -->
  <div id="app">
    <div class="boot-screen" id="boot-screen">
      <div class="boot-spinner" id="boot-spinner"></div>
      <p class="boot-msg" id="boot-msg">Loading Patient Navigator…</p>
      <button class="boot-link" id="boot-retry" style="display:none" onclick="location.reload()">Retry</button>
    </div>
  </div>

  <!-- CDN scripts: deferred so they NEVER block the boot screen.
       defer scripts download in parallel and execute after DOM parse,
       but BEFORE the type=module app.js (which is naturally deferred). -->
  <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- App entry point -->
  <script type="module" src="js/app.js"></script>

  <!-- Boot watchdog: surfaces a clear error if external scripts fail to load
       (network blocked, CDN down, captive portal, etc.) instead of leaving
       the user staring at a spinner forever. -->
  <script>
    (function(){
      var STAGES = {
        SLOW:   5000,   // 5s — "taking too long"
        SCRIPT: 10000,  // 10s — Supabase JS still not loaded → CDN blocked
        TOTAL:  15000   // 15s — App still hasn't booted → give up cleanly
      };
      var bootScreen = document.getElementById('boot-screen');
      var msg = document.getElementById('boot-msg');
      var retry = document.getElementById('boot-retry');

      // Stage 1 — gentle nudge
      setTimeout(function(){
        if (!bootScreen.isConnected) return;
        if (msg) msg.textContent = 'Still loading… your network may be slow.';
        if (retry) retry.style.display = 'inline-block';
      }, STAGES.SLOW);

      // Stage 2 — CDN diagnostic
      setTimeout(function(){
        if (!bootScreen.isConnected) return;
        if (!window.supabase) {
          if (msg) {
            msg.classList.add('boot-error');
            msg.innerHTML = 'Could not load required scripts.<br>Your network may be blocking jsdelivr.net.<br>Try a different network or VPN.';
          }
          if (retry) retry.style.display = 'inline-block';
        }
      }, STAGES.SCRIPT);

      // Stage 3 — final timeout. If app.js never replaced the boot screen,
      // the SPA is stuck. Show a hard fail message.
      setTimeout(function(){
        if (!bootScreen.isConnected) return;
        if (msg) {
          msg.classList.add('boot-error');
          msg.innerHTML = 'Patient Navigator failed to start.<br>Please refresh the page.<br>If this keeps happening, contact admin.';
        }
        if (retry) retry.style.display = 'inline-block';
      }, STAGES.TOTAL);
    })();
  </script>
</body>
</html>
