<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarurat Care Foundation – HOPE Circle</title>
    <meta name="description" content="Join your HOPE Circle support group. Connect with others who understand your journey.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy: #0a1628;
            --navy-mid: #132744;
            --blue-deep: #1a3a5c;
            --blue: #2563eb;
            --blue-light: #60a5fa;
            --blue-pale: #dbeafe;
            --blue-glow: #3b82f6;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-400: #94a3b8;
            --gray-600: #475569;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(10, 22, 40, 0.12);
            --shadow-lg: 0 8px 40px rgba(10, 22, 40, 0.18);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 40%, var(--blue-deep) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: var(--white);
        }

        /* ─── Container ─── */
        .container {
            width: 100%;
            max-width: 540px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── Header ─── */
        .header {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
            padding: 32px 28px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -40%; left: -20%;
            width: 140%; height: 140%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
            pointer-events: none;
        }

        .logo-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 26px;
            box-shadow: 0 0 20px rgba(255,255,255,0.15);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            line-height: 1.3;
        }
        .header h1 span {
            display: block;
            font-size: 24px;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: 1px;
        }
        .header p {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
            line-height: 1.5;
        }

        /* ─── Body ─── */
        .body {
            padding: 28px;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--blue-light);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 16px;
        }

        /* ─── Radio Cards ─── */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .options::-webkit-scrollbar { width: 4px; }
        .options::-webkit-scrollbar-track { background: transparent; }
        .options::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

        .option-card {
            position: relative;
            cursor: pointer;
            transition: var(--transition);
        }
        .option-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }
        .option-label {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            transition: var(--transition);
        }
        .option-card:hover .option-label {
            border-color: rgba(96, 165, 250, 0.3);
            background: rgba(96, 165, 250, 0.06);
        }
        .option-card input:checked + .option-label {
            border-color: var(--blue-light);
            background: rgba(37, 99, 235, 0.12);
            box-shadow: 0 0 0 1px var(--blue-light), 0 2px 12px rgba(37, 99, 235, 0.15);
        }

        .radio-dot {
            width: 20px; height: 20px;
            min-width: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            margin-top: 2px;
            transition: var(--transition);
        }
        .radio-dot::after {
            content: '';
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--blue-light);
            transform: scale(0);
            transition: var(--transition);
        }
        .option-card input:checked + .option-label .radio-dot {
            border-color: var(--blue-light);
        }
        .option-card input:checked + .option-label .radio-dot::after {
            transform: scale(1);
        }

        .option-text h3 {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
            margin-bottom: 3px;
        }
        .option-text .translations {
            font-size: 11.5px;
            font-weight: 500;
            color: var(--gray-400);
            line-height: 1.5;
        }
        .option-text .subtypes {
            font-size: 10.5px;
            color: rgba(255,255,255,0.35);
            margin-top: 4px;
            line-height: 1.45;
        }

        /* ─── Button ─── */
        .btn-wrap {
            margin-top: 24px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
        }
        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(37, 99, 235, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .wa-icon {
            width: 20px; height: 20px;
        }

        /* ─── Footer ─── */
        .footer {
            text-align: center;
            padding: 0 28px 22px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            line-height: 1.5;
        }
        .footer a {
            color: var(--blue-light);
            text-decoration: none;
        }

        /* ─── Responsive ─── */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .header { padding: 24px 20px 20px; }
            .header h1 { font-size: 15px; }
            .header h1 span { font-size: 20px; }
            .body { padding: 20px; }
            .options { max-height: 340px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-icon">💙</div>
        <h1>
            Jarurat Care Foundation
            <span>HOPE Circle</span>
        </h1>
        <p>
            अपना सहायता समूह चुनें &nbsp;·&nbsp; आपला सहाय्यता गट निवडा<br>
            Select your support group below
        </p>
    </div>

    <!-- Body -->
    <div class="body">
        <div class="step-label">Choose your cancer type</div>

        <div class="options" id="optionsContainer">
            <!-- Options injected by JS -->
        </div>

        <div class="btn-wrap">
            <button class="btn btn-primary" id="joinBtn" disabled onclick="redirectToGroup()">
                <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Join WhatsApp Group
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2025 Jarurat Care Foundation · All rights reserved
    </div>
</div>

<script>
// ─────────────────────────────────────────────
// Cancer Buckets Data
// Each bucket has: id, english name, hindi, marathi,
// subtypes list, and a redirect URL (update these URLs)
// ─────────────────────────────────────────────
const CANCER_GROUPS = [
    {
        id: "esophagus-stomach",
        en: "Esophagus & Stomach Cancers",
        hi: "अन्नप्रणाली और पेट का कैंसर",
        mr: "अन्ननलिका आणि पोटाचा कर्करोग",
        subtypes: "EC · GEJ · Gastric Cancer",
        // ⬇️ UPDATE THIS URL to the actual WhatsApp group invite link
        url: "https://www.google.com"
    },
    {
        id: "intestinal-colorectal",
        en: "Intestinal & Colorectal Cancers",
        hi: "आंत और कोलोरेक्टल कैंसर",
        mr: "आतडे आणि कोलोरेक्टल कर्करोग",
        subtypes: "CRC · Small Bowel · Anal · Appendiceal",
        url: "https://www.youtube.com"
    },
    {
        id: "liver",
        en: "Liver Cancers",
        hi: "लिवर (यकृत) का कैंसर",
        mr: "यकृताचा (लिव्हर) कर्करोग",
        subtypes: "HCC · Hepatoblastoma",
        url: "https://www.facebook.com"
    },
    {
        id: "gallbladder-bile-duct",
        en: "Gallbladder & Bile Duct Cancers",
        hi: "पित्ताशय और पित्त नली का कैंसर",
        mr: "पित्ताशय आणि पित्तनलिकेचा कर्करोग",
        subtypes: "GBC · BTC / CCA",
        url: "https://www.google.com"
    },
    {
        id: "pancreatic-ampullary",
        en: "Pancreatic & Ampullary Cancers",
        hi: "अग्नाशय और एम्पुलरी कैंसर",
        mr: "स्वादुपिंड आणि एम्पुलरी कर्करोग",
        subtypes: "PDAC · Ampullary · pNETs",
        url: "https://www.youtube.com"
    },
    {
        id: "rare-special-gi",
        en: "Rare & Special GI Tumors",
        hi: "दुर्लभ और विशेष जीआई ट्यूमर",
        mr: "दुर्मिळ आणि विशेष जीआई गाठी",
        subtypes: "GIST · GI NETs · PPC · GI Lymphoma",
        url: "https://www.facebook.com"
    }
];

// ─────────────────────────────────────────────
// Render options
// ─────────────────────────────────────────────
const container = document.getElementById('optionsContainer');
const joinBtn = document.getElementById('joinBtn');
let selectedUrl = null;

CANCER_GROUPS.forEach((group, idx) => {
    const card = document.createElement('label');
    card.className = 'option-card';
    card.innerHTML = `
        <input type="radio" name="cancer" value="${group.id}" data-url="${group.url}">
        <div class="option-label">
            <div class="radio-dot"></div>
            <div class="option-text">
                <h3>${group.en}</h3>
                <div class="translations">${group.hi} &nbsp;·&nbsp; ${group.mr}</div>
                <div class="subtypes">${group.subtypes}</div>
            </div>
        </div>
    `;
    card.style.animationDelay = `${idx * 0.06}s`;
    container.appendChild(card);
});

// ─────────────────────────────────────────────
// Selection handler
// ─────────────────────────────────────────────
container.addEventListener('change', (e) => {
    if (e.target.name === 'cancer') {
        selectedUrl = e.target.dataset.url;
        joinBtn.disabled = false;
    }
});

function redirectToGroup() {
    if (selectedUrl) {
        window.location.href = selectedUrl;
    }
}
</script>

</body>
</html>
